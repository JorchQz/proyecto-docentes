<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SaaS NEM - Ajustes</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen pt-16 px-4 md:px-8 pb-8 text-gray-800">
	<div class="max-w-4xl mx-auto flex flex-col gap-6">
		<header class="bg-blue-800 rounded-2xl shadow-md p-6">
			<h1 class="text-2xl md:text-3xl font-bold text-white">Ajustes</h1>
			<p class="text-blue-100 text-sm md:text-base mt-1">Configuraciones avanzadas del sistema</p>
		</header>

		<main class="space-y-6">
			<section class="bg-white rounded-2xl shadow-md p-6">
				<h2 class="text-lg font-bold text-gray-800">Preferencias de notificación</h2>
				<p class="text-sm text-gray-500 mt-1">Define qué notificaciones quieres recibir cuando activemos este módulo.</p>

				<div id="notificationsMessage" class="mt-4"></div>

				<form id="notificationsForm" class="mt-4 space-y-3">
					<label class="flex items-start gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50">
						<input id="notifTaskReview" type="checkbox" class="mt-1 h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
						<span>
							<span class="block text-sm font-medium text-gray-800">Revisión de tareas</span>
							<span class="block text-xs text-gray-500">Avisos cuando haya tareas por revisar o pendientes de evaluación.</span>
						</span>
					</label>

					<label class="flex items-start gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50">
						<input id="notifTaskUpdates" type="checkbox" class="mt-1 h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
						<span>
							<span class="block text-sm font-medium text-gray-800">Actualizaciones de tareas y entregas</span>
							<span class="block text-xs text-gray-500">Recordatorios y cambios relevantes sobre tareas asignadas.</span>
						</span>
					</label>

					<label class="flex items-start gap-3 p-3 rounded-lg border border-gray-200 hover:bg-gray-50">
						<input id="notifWeeklySummary" type="checkbox" class="mt-1 h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
						<span>
							<span class="block text-sm font-medium text-gray-800">Resumen semanal</span>
							<span class="block text-xs text-gray-500">Resumen de pendientes, avances y sugerencias para la semana.</span>
						</span>
					</label>

					<button id="saveNotificationsBtn" type="submit" class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700 transition-colors">
						Guardar preferencias
					</button>
				</form>
			</section>

			<section class="bg-white rounded-2xl shadow-md p-6">
				<p class="text-gray-500">Espacio reservado para configuraciones futuras.</p>
			</section>
		</main>
	</div>

	<script src="js/supabase.js"></script>
	<script src="js/navbar.js"></script>
	<script src="js/section-shell.js"></script>
	<script src="js/ajustes.js"></script>
</body>
</html>
