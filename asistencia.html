<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SaaS NEM - Lista de Asistencia</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen pt-16 px-4 md:px-8 pb-8 text-gray-800">
	<div class="max-w-4xl mx-auto flex flex-col gap-6">
		<header class="bg-blue-800 rounded-2xl shadow-md p-6">
			<h1 class="text-2xl md:text-3xl font-bold text-white">Lista de Asistencia</h1>
			<p class="text-blue-100 text-sm md:text-base mt-1">Pase de lista rápido para el grupo activo</p>
		</header>

		<main class="bg-white rounded-2xl shadow-md p-6">
			<section class="flex flex-col gap-4">
				<div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
					<div>
						<p class="text-sm text-gray-500">Fecha</p>
						<input id="attendanceDateInput" type="date" class="mt-1 block w-44 rounded-lg border border-gray-300 px-3 py-2 text-gray-800 text-lg font-semibold focus:ring-blue-500 focus:border-blue-500" />
					</div>
					<div class="flex items-center gap-2">
						<button id="markAllPresentBtn" type="button" class="px-3 py-2 rounded-lg text-sm font-medium border border-gray-300 text-gray-700 hover:bg-gray-100 transition-colors">
							Marcar todos
						</button>
						<button id="clearAllBtn" type="button" class="px-3 py-2 rounded-lg text-sm font-medium border border-gray-300 text-gray-700 hover:bg-gray-100 transition-colors">
							Limpiar
						</button>
					</div>
				</div>

				<p class="text-xs text-gray-500">Guardado automático activado al marcar o desmarcar.</p>

				<div id="attendanceMessage" class="hidden rounded-lg px-4 py-3 text-sm"></div>

				<div id="attendanceSummary" class="text-sm text-gray-600">Cargando alumnos...</div>

				<div id="attendanceList" class="grid grid-cols-1 gap-2"></div>
			</section>
		</main>
	</div>

	<script src="js/supabase.js"></script>
	<script src="js/navbar.js"></script>
	<script src="js/section-shell.js"></script>
	<script src="js/asistencia.js"></script>
</body>
</html>
