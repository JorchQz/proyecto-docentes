<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS NEM - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 text-gray-800">

    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">ProfeTech</h1>
            <p class="text-gray-500">Gestión Inteligente NEM</p>
        </div>

        <form id="loginForm" class="space-y-6">
			<div id="teacherNameField" class="hidden">
				<label class="block text-sm font-medium text-gray-800">Nombre del Profesor(a)</label>
				<input type="text" id="teacherName" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="Ej: María Fernanda López" maxlength="100" autocomplete="name">
			</div>

            <div id="teacherSexField" class="hidden">
                <label for="teacherSex" class="block text-sm font-medium text-gray-800">Sexo</label>
                <select id="teacherSex" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    <option value="">Selecciona una opción</option>
                    <option value="profesora">Mujer (Profesora)</option>
                    <option value="profesor">Hombre (Profesor)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-800">Correo Electrónico</label>
                <input type="email" id="email" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="maestra@escuela.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-800">Contraseña</label>
                <input type="password" id="password" required class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="••••••••">
            </div>

            <div class="text-right -mt-2">
                <a href="#" id="forgotPasswordLink" class="text-sm font-medium text-blue-600 hover:text-blue-700">Olvide mi contraseña</a>
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-500">
                ¿No tienes cuenta? <a href="#" class="font-medium text-blue-600 hover:text-blue-700">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
