<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SaaS NEM - Dashboard</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen pt-16 px-4 md:px-8 pb-8 text-gray-800">
	<div class="max-w-4xl mx-auto flex flex-col gap-6">
		<header class="bg-blue-800 rounded-2xl shadow-md p-6">
			<h1 id="welcomeTitle" class="text-2xl md:text-3xl font-bold text-white">Bienvenido</h1>
			<p class="text-blue-100 text-sm md:text-base mt-1">Panel principal del docente</p>
		</header>

		<main class="bg-white rounded-2xl shadow-md p-6">
			<div class="mb-6">
				<p class="text-gray-500">Docente:</p>
				<p id="userName" class="mt-1 text-lg font-semibold text-gray-800">Cargando...</p>

				<p class="text-gray-500">Sesión iniciada como:</p>
				<p id="userEmail" class="mt-1 text-lg font-semibold text-gray-800">Cargando...</p>
			</div>

			<div id="homeMessage" class="mb-6"></div>

			<section class="border-t pt-6">
				<h2 class="text-xl font-bold text-gray-800">Personaliza tu inicio</h2>
				<p class="text-sm text-gray-500 mt-1">Elige qué módulos ver primero y en qué orden.</p>

				<form id="homePreferencesForm" class="mt-4 space-y-3">
					<div id="homePrefsContainer" class="space-y-3"></div>
					<button id="saveHomePrefsBtn" type="submit" class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700 transition-colors">
						Guardar configuración
					</button>
				</form>
			</section>

			<section class="border-t pt-6 mt-6">
				<h2 class="text-xl font-bold text-gray-800">Tu inicio</h2>
				<p class="text-sm text-gray-500 mt-1">Estos módulos se muestran según tu configuración.</p>

				<div id="homeCards" class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-6"></div>
			</section>
		</main>
	</div>

	<script src="js/supabase.js"></script>
	<script src="js/navbar.js"></script>
	<script src="js/dashboard.js"></script>
</body>
</html>
