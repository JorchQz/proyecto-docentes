<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SaaS NEM - Dashboard</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
	<div class="max-w-4xl mx-auto">
		<header class="bg-white rounded-2xl shadow p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
			<div>
				<h1 class="text-2xl md:text-3xl font-bold text-indigo-700">Dashboard Docente</h1>
				<p class="text-gray-600 text-sm md:text-base">Acceso protegido por sesión de Supabase Auth</p>
			</div>
			<button id="logoutBtn" class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-red-600 text-white font-medium hover:bg-red-700 transition-colors">
				Cerrar sesión
			</button>
		</header>

		<main class="mt-6 bg-white rounded-2xl shadow p-6">
			<div class="mb-6">
				<p class="text-gray-700">Sesión iniciada como:</p>
				<p id="userEmail" class="mt-1 text-lg font-semibold text-gray-900">Cargando...</p>
			</div>

			<div class="border-t pt-6">
				<h2 class="text-xl font-bold text-gray-900 mb-4">Información del Grupo</h2>
				<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
					<div>
						<p class="text-sm text-gray-600">Nombre del Grupo</p>
						<p id="groupName" class="text-lg font-semibold text-gray-900">Cargando...</p>
					</div>
					<div>
						<p class="text-sm text-gray-600">Tipo de Organización</p>
						<p id="groupType" class="text-lg font-semibold text-gray-900">Cargando...</p>
					</div>
					<div>
						<p class="text-sm text-gray-600">Grados que Atiende</p>
						<p id="groupGrades" class="text-lg font-semibold text-gray-900">Cargando...</p>
					</div>
				</div>
			</div>
		</main>
	</div>

	<script src="js/supabase.js"></script>
	<script src="js/dashboard.js"></script>
</body>
</html>
