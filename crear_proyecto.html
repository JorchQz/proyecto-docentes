
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Proyecto - SaaS NEM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 text-gray-800">
  <div class="max-w-4xl mx-auto flex flex-col gap-6">
    <!-- Header -->
    <header class="bg-blue-800 rounded-2xl shadow-md p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-white">Crear Nuevo Proyecto</h1>
        <p class="text-blue-100 text-sm md:text-base">Llena los datos para tu nuevo proyecto</p>
      </div>
      <div class="relative self-end md:self-auto">
        <button id="mainMenuBtn" type="button" aria-label="Abrir configuraciones" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-blue-700 bg-blue-700 text-white hover:bg-blue-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 7h16" />
            <path d="M4 12h16" />
            <path d="M4 17h16" />
          </svg>
        </button>
        <div id="mainMenuPanel" class="hidden absolute right-0 mt-2 w-48 rounded-lg border border-gray-200 bg-white shadow-md p-1 z-20">
          <a href="mi-cuenta.html" class="block w-full text-left px-3 py-2 rounded-md text-sm font-medium text-gray-800 hover:bg-gray-100 transition-colors">Mi cuenta</a>
          <a href="mi-grupo.html" class="block w-full text-left px-3 py-2 rounded-md text-sm font-medium text-gray-800 hover:bg-gray-100 transition-colors">Mi grupo</a>
          <a href="ajustes.html" class="block w-full text-left px-3 py-2 rounded-md text-sm font-medium text-gray-800 hover:bg-gray-100 transition-colors">Ajustes</a>
          <button id="logoutBtn" type="button" class="w-full text-left px-3 py-2 rounded-md text-sm font-medium text-red-700 hover:bg-red-50 transition-colors">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <!-- Barra de navegación principal -->
    <nav class="bg-white rounded-2xl shadow-sm border border-gray-200 p-2" aria-label="Navegación principal">
      <div class="flex items-center gap-2 overflow-x-auto">
        <a href="dashboard.html" class="inline-flex items-center gap-2 whitespace-nowrap rounded-xl px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
          Inicio
        </a>
        <a href="asistencia.html" class="inline-flex items-center gap-2 whitespace-nowrap rounded-xl px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h8M8 15h5"/></svg>
          Lista de asistencia
        </a>
        <a href="actividades.html" class="inline-flex items-center gap-2 whitespace-nowrap rounded-xl px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19h16"/><path d="M7 16V8"/><path d="M12 16V5"/><path d="M17 16v-4"/></svg>
          Actividades
        </a>
        <a href="tareas.html" class="inline-flex items-center gap-2 whitespace-nowrap rounded-xl px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11.5 11 13.5l4-4"/><rect x="3" y="4" width="18" height="16" rx="2"/></svg>
          Tareas
        </a>
        <a href="reportes.html" class="inline-flex items-center gap-2 whitespace-nowrap rounded-xl px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 20V10"/><path d="M12 20V4"/><path d="M18 20v-7"/></svg>
          Reportes
        </a>
        <a href="crear_proyecto.html" class="inline-flex items-center gap-2 whitespace-nowrap rounded-xl px-3 py-2 text-sm font-medium text-blue-800 bg-blue-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          Crear Proyecto
        </a>
      </div>
    </nav>

    <!-- Main -->
    <main class="bg-white rounded-2xl shadow-md p-6">
      <div class="mb-6">
        <p class="text-gray-500">Docente:</p>
        <p id="userName" class="mt-1 text-lg font-semibold text-gray-800">Cargando...</p>
        <p class="text-gray-500">Sesión iniciada como:</p>
        <p id="userEmail" class="mt-1 text-lg font-semibold text-gray-800">Cargando...</p>
      </div>

      <!-- Paso 1: Datos Generales -->
      <section class="border-t pt-6" id="step1-datos-generales">
        <h2 class="text-xl font-bold text-gray-800 mb-4">Paso 1: Datos Generales</h2>
        <form id="formPaso1" class="grid grid-cols-1 md:grid-cols-2 gap-6">



          <!-- Título -->
          <div class="md:col-span-2">
            <label class="block text-gray-700 mb-2 font-medium">Título del Proyecto</label>
            <input type="text" name="titulo" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Ej. Proyecto NEM 2026" required>
          </div>

          <!-- Fechas: inicial y final -->
          <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-gray-700 mb-2 font-medium">Fecha inicial</label>
              <input type="date" name="fecha_inicial" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600" required>
            </div>
            <div>
              <label class="block text-gray-700 mb-2 font-medium">Fecha final</label>
              <input type="date" name="fecha_final" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600" required>
            </div>
          </div>

          <!-- Fila: Fase y Grados -->
          <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Fase (checkboxes en card vertical) -->
            <div>
              <label class="block text-gray-700 mb-2 font-medium">Fase</label>
              <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                <div id="faseCheckboxes" class="flex flex-col gap-3">
                  <!-- Opciones dinámicas por JS -->
                </div>
              </div>
            </div>
            <!-- Grados (checkboxes en card vertical) -->
            <div>
              <label class="block text-gray-700 mb-2 font-medium">Grados</label>
              <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                <div id="gradosCheckboxes" class="flex flex-col gap-3">
                  <!-- Opciones dinámicas por JS -->
                </div>
              </div>
            </div>
          </div>

          <!-- Fila: Metodología y Escenario -->
          <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Metodología (radio en card vertical) -->
            <div>
              <label class="block text-gray-700 mb-2 font-medium">Metodología</label>
              <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                <div class="flex flex-col gap-3">
                  <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="radio" name="metodologia" value="ABPC" class="form-radio h-5 w-5 text-blue-600 border-gray-300 focus:ring-blue-500" required> <span class="text-gray-800">Aprendizaje Basado en Proyectos Comunitarios (ABPC)</span></label>
                  <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="radio" name="metodologia" value="STEAM" class="form-radio h-5 w-5 text-blue-600 border-gray-300 focus:ring-blue-500" required> <span class="text-gray-800">Aprendizaje Basado en Indagación (Enfoque STEAM)</span></label>
                  <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="radio" name="metodologia" value="ABP" class="form-radio h-5 w-5 text-blue-600 border-gray-300 focus:ring-blue-500" required> <span class="text-gray-800">Aprendizaje Basado en Problemas (ABP)</span></label>
                  <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="radio" name="metodologia" value="AS" class="form-radio h-5 w-5 text-blue-600 border-gray-300 focus:ring-blue-500" required> <span class="text-gray-800">Aprendizaje de Servicio (AS)</span></label>
                </div>
              </div>
            </div>
            <!-- Escenario (radio en card vertical) -->
            <div>
              <label class="block text-gray-700 mb-2 font-medium">Escenario</label>
              <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
                <div class="flex flex-col gap-3">
                  <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="radio" name="escenario" value="Aula" class="form-radio h-5 w-5 text-blue-600 border-gray-300 focus:ring-blue-500" required> <span class="text-gray-800">Aula</span></label>
                  <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="radio" name="escenario" value="Escolar" class="form-radio h-5 w-5 text-blue-600 border-gray-300 focus:ring-blue-500" required> <span class="text-gray-800">Escolar</span></label>
                  <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="radio" name="escenario" value="Comunitario" class="form-radio h-5 w-5 text-blue-600 border-gray-300 focus:ring-blue-500" required> <span class="text-gray-800">Comunitario</span></label>
                </div>
              </div>
            </div>
          </div>

          <!-- Propósito -->
          <div class="md:col-span-2">
            <label class="block text-gray-700 mb-2 font-medium">Propósito</label>
            <textarea name="proposito" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Describe el propósito del proyecto" required></textarea>
          </div>

          <!-- Campos formativos (checkboxes en card vertical) -->
          <div class="md:col-span-2">
            <label class="block text-gray-700 mb-2 font-medium">Campos formativos</label>
            <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
              <div class="flex flex-col gap-3">
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="campos_formativos" value="Lenguajes" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Lenguajes</span></label>
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="campos_formativos" value="Saberes y Pensamiento Científico" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Saberes y Pensamiento Científico</span></label>
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="campos_formativos" value="Ética, Naturaleza y Sociedades" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Ética, Naturaleza y Sociedades</span></label>
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="campos_formativos" value="De lo Humano y lo Comunitario" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">De lo Humano y lo Comunitario</span></label>
              </div>
            </div>
          </div>

          <!-- Ejes articuladores (checkboxes en card vertical) -->
          <div class="md:col-span-2">
            <label class="block text-gray-700 mb-2 font-medium">Ejes articuladores</label>
            <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
              <div class="flex flex-col gap-3">
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="ejes_articuladores" value="Inclusión" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Inclusión</span></label>
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="ejes_articuladores" value="Pensamiento Crítico" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Pensamiento Crítico</span></label>
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="ejes_articuladores" value="Interculturalidad Crítica" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Interculturalidad Crítica</span></label>
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="ejes_articuladores" value="Igualdad de Género" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Igualdad de Género</span></label>
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="ejes_articuladores" value="Vida Saludable" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Vida Saludable</span></label>
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="ejes_articuladores" value="Apropiación de las culturas a través de la lectura y la escritura" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Apropiación de las culturas a través de la lectura y la escritura</span></label>
                <label class="inline-flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" name="ejes_articuladores" value="Artes y experiencias estéticas" class="form-checkbox h-5 w-5 text-blue-600 rounded-full border-gray-300 focus:ring-blue-500"> <span class="text-gray-800">Artes y experiencias estéticas</span></label>
              </div>
            </div>
          </div>

          <!-- Pregunta Generadora -->
          <div class="md:col-span-2">
            <label class="block text-gray-700 mb-2 font-medium">Pregunta Generadora</label>
            <textarea name="pregunta_generadora" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-600" placeholder="Escribe la pregunta generadora del proyecto" required></textarea>
          </div>

          <!-- Botón siguiente paso -->
          <div class="md:col-span-2 flex justify-end mt-4">
            <button type="submit" class="bg-blue-600 text-white font-bold px-6 py-2 rounded-xl shadow-sm hover:bg-blue-700 transition">Siguiente</button>
          </div>
        </form>
      </section>

    </main>

    <!-- Footer eliminado temporalmente para el paso final -->
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/section-shell.js"></script>
  <script src="js/crear_proyecto.js"></script>
</body>
</html>
