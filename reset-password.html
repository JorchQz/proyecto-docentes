<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS NEM - Restablecer Contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 text-gray-800">

    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">ProfeTech</h1>
            <p class="text-gray-500">Restablecer contraseña</p>
        </div>

        <form id="resetPasswordForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-800">Nueva contraseña</label>
                <input type="password" id="newPassword" required minlength="6" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="••••••••">

                <div class="mt-3">
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-600">Fortaleza</span>
                        <span id="passwordStrengthLabel" class="text-xs font-medium text-gray-600">Sin evaluar</span>
                    </div>
                    <div class="mt-1 h-2 w-full bg-gray-200 rounded-full overflow-hidden">
                        <div id="passwordStrengthBar" class="h-full w-0 bg-gray-400 transition-all duration-300"></div>
                    </div>
                    <p id="passwordStrengthHint" class="text-xs text-gray-500 mt-2">
                        Recomendado: 8+ caracteres, mayúsculas, minúsculas, número y símbolo.
                    </p>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-800">Confirmar nueva contraseña</label>
                <input type="password" id="confirmPassword" required minlength="6" class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                Guardar nueva contraseña
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-500">
                ¿Ya la recordaste? <a href="index.html" class="font-medium text-blue-600 hover:text-blue-700">Volver a iniciar sesión</a>
            </p>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
